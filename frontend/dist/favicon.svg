<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Orange border ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#FF6B00" stroke-width="1.5" opacity="0.6"/>
  <!-- Leaf shape -->
  <path d="M32 10 C32 10 48 18 48 32 C48 44 40 50 32 52 C24 50 16 44 16 32 C16 18 32 10 32 10Z" fill="url(#leaf)" opacity="0.95"/>
  <!-- Leaf vein center -->
  <line x1="32" y1="12" x2="32" y2="50" stroke="#bbf7d0" stroke-width="1.2" opacity="0.5"/>
  <!-- Leaf veins left -->
  <line x1="32" y1="24" x2="20" y2="32" stroke="#bbf7d0" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="32" x2="19" y2="38" stroke="#bbf7d0" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="40" x2="22" y2="45" stroke="#bbf7d0" stroke-width="0.8" opacity="0.4"/>
  <!-- Leaf veins right -->
  <line x1="32" y1="24" x2="44" y2="32" stroke="#bbf7d0" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="32" x2="45" y2="38" stroke="#bbf7d0" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="40" x2="42" y2="45" stroke="#bbf7d0" stroke-width="0.8" opacity="0.4"/>
  <!-- FF text -->
  <text x="32" y="36" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1" opacity="0.95">FF</text>
</svg>
