<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="flamGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#00C853"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="32" fill="#050A05"/>

  <!-- Green ring border -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#00C853" stroke-width="1.5" opacity="0.5"/>

  <!-- Flame path — matches Lucide Flame shape -->
  <g filter="url(#glow)" transform="translate(16, 10) scale(1.0)">
    <path
      d="M16 2
         C16 2 20 8 18 14
         C22 10 22 6 22 6
         C22 6 28 12 26 20
         C28 18 29 15 29 15
         C29 15 32 20 30 26
         C28 32 22 36 16 36
         C10 36 4 32 2 26
         C0 20 3 15 3 15
         C3 15 4 18 6 20
         C4 12 10 6 10 6
         C10 6 10 10 14 14
         C12 8 16 2 16 2Z"
      fill="url(#flamGrad)"
      stroke="#00FF88"
      stroke-width="0.8"
      stroke-linejoin="round"
      opacity="0.95"
    />
  </g>
</svg>
