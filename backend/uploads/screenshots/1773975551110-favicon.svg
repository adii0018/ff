<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="leaf1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#2ea043"/>
    </linearGradient>
    <linearGradient id="leaf2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ea043"/>
      <stop offset="100%" style="stop-color:#238636"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="100" height="100" rx="22" fill="#161b22"/>
  <rect width="100" height="100" rx="22" fill="none" stroke="#30363d" stroke-width="2"/>

  <!-- Right leaf lobe (lighter) -->
  <path d="M50 18 C50 18 78 32 78 56 C78 72 65 82 50 82 C50 82 50 52 50 18 Z"
        fill="url(#leaf1)" opacity="0.95"/>

  <!-- Left leaf lobe (darker, slightly transparent) -->
  <path d="M50 18 C50 18 22 32 22 56 C22 72 35 82 50 82 C50 82 50 52 50 18 Z"
        fill="url(#leaf2)" opacity="0.65"/>

  <!-- Center vein -->
  <line x1="50" y1="22" x2="50" y2="78"
        stroke="#0d1117" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>

  <!-- Stem -->
  <path d="M50 82 Q48 88 44 92"
        fill="none" stroke="#2ea043" stroke-width="2.5" stroke-linecap="round"/>
</svg>
